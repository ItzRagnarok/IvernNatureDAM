<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8">
	<title>Gestionar Minijuego</title>
	<link rel="icon" href="/images/Logo.png">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
	<link rel="stylesheet" href="/css/curso.css">
</head>

<body>
	<header th:replace="~{cabeceraMenu :: cabeceraMenu}"></header>
	<main>
		<section>
			<article class="cabeceraCurso">
				<h1>Añadir casos a: <span th:text="${quizz.titulo}"></span></h1>
				<a th:href="@{/cursos/curso/{id}(id=${quizz.curso.idcurso})}" class="btn"
					style="background-color: #7f8c8d; color: white; padding: 10px; text-decoration: none; border-radius: 5px;">
					← Volver al Curso
				</a>
			</article>

			<div th:if="${mensaje}" class="alert alert-success" style="color: green; padding: 10px;">
				<p th:text="${mensaje}"></p>
			</div>

			<article class="section" style="display:block;">
				<h2>Nueva Pregunta / Plaga</h2>
				<form th:action="@{/cursos/quizz/{id}/casos/guardar(id=${quizz.idquizz})}" method="post"
					enctype="multipart/form-data">

					<input type="text" name="texto" placeholder="Diagnóstico (Ej: Hojas comidas con agujeros)" required
						style="width: 100%; margin-bottom: 10px; padding: 8px;">

					<select name="solucion" required style="width: 100%; margin-bottom: 10px; padding: 8px;">
						<option value="" disabled selected>Selecciona la herramienta a usar...</option>
						<option value="insecticida">Insecticida</option>
						<option value="fungicida">Fungicida</option>
						<option value="abono">Abono NPK</option>
						<option value="agua">Riego Extra</option>
					</select>

					<input type="text" name="mensajeExito"
						placeholder="Mensaje al acertar (Ej: ¡Bien hecho! Has eliminado las orugas)" required
						style="width: 100%; margin-bottom: 10px; padding: 8px;">
					<input type="text" name="pistaError"
						placeholder="Pista al fallar (Ej: Esos mordiscos son de un insecto masticador)" required
						style="width: 100%; margin-bottom: 10px; padding: 8px;">

					<div style="margin-bottom: 15px;">
						<label for="archivoImagen"><strong>Sube la imagen del caso:</strong></label><br>
						<input type="file" name="archivoImagen" accept="image/*" required>
					</div>

					<button type="submit"
						style="background-color: #2ecc71; color: white; padding: 10px 20px; border: none; cursor: pointer;">Guardar
						Caso Clínico</button>
				</form>

				<hr style="margin: 30px 0;">

				<h2>Casos subidos actualmente</h2>
				<table>
					<thead>
						<tr>
							<th>Diagnóstico</th>
							<th>Solución</th>
							<th>Imagen</th>
							<th>Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="caso : ${quizz.casos}">
							<td th:text="${caso.texto}"></td>
							<td th:text="${caso.solucion}"></td>
							<td th:text="${caso.img}"></td>
							<td>
								<form
									th:action="@{/cursos/quizz/{idQuizz}/casos/{idCaso}/eliminar(idQuizz=${quizz.idquizz}, idCaso=${caso.idcasoquizz})}"
									method="post" style="display: inline;">
									<button type="button" class="btn-modal-borrar"
										data-mensaje="¿Estás seguro de eliminar esta plaga del minijuego?"
										style="background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1.2em;"
										title="Eliminar plaga">
										<i class="fa-solid fa-trash-can"></i>
									</button>
								</form>
							</td>
						</tr>
					</tbody>
				</table>
			</article>
			<!-- Modal -->
			<div id="modalConfirmacion" class="modal">
				<div class="modal-content">
					<h2>Confirmar Eliminación</h2>
					<p id="modalMensaje">¿Estás seguro de que deseas eliminar este elemento?</p>
					<button id="confirmDelete" class="btn-eliminar">Eliminar</button>
					<button id="cancelDelete" class="btn-cancelar">Cancelar</button>
				</div>
			</div>
		</section>
	</main>
	<footer th:replace="~{footer :: footerPaginas}"></footer>

	<script>
		function showSection(sectionId) {
			var sections = document.querySelectorAll('.section');
			sections.forEach(function (section) {
				section.style.display = 'none';
			});
			var selectedSection = document.getElementById(sectionId);
			if (selectedSection) {
				selectedSection.style.display = 'block';
			} else {
				console.error('No se encontró la sección: ' + sectionId);
			}
		}

		document.addEventListener('DOMContentLoaded', function () {
			var modal = document.getElementById("modalConfirmacion");
			var confirmBtn = document.getElementById("confirmDelete");
			var cancelBtn = document.getElementById("cancelDelete");
			var mensajeParrafo = document.getElementById("modalMensaje");
			var formToSubmit = null;

			// Escuchamos los clics en los botones de papelera
			document.querySelectorAll('.btn-modal-borrar').forEach(btn => {
				btn.addEventListener('click', function (event) {
					event.preventDefault();

					// Guardamos el formulario asociado
					formToSubmit = this.closest('form');

					// Personalizamos el mensaje del modal
					var textoDeseado = this.getAttribute('data-mensaje');
					mensajeParrafo.textContent = textoDeseado || "¿Estás seguro de eliminar este caso?";

					// Abrimos el modal
					modal.style.display = "block";
				});
			});

			// Acción de confirmar eliminar (Botón Rojo)
			confirmBtn.addEventListener('click', function () {
				if (formToSubmit) {
					formToSubmit.submit();
				}
			});

			// Acción de cancelar (Botón Verde)
			cancelBtn.addEventListener('click', function () {
				modal.style.display = "none";
				formToSubmit = null;
			});

			// Cerrar si se hace clic fuera del recuadro blanco
			window.onclick = function (event) {
				if (event.target === modal) {
					modal.style.display = "none";
					formToSubmit = null;
				}
			};
		});
	</script>

</body>

</html>
